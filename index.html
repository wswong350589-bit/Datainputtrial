<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datainputtrial - GitHub Template Version</title>
    <!-- 引入 QR Code 掃描庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- 引入穩定版 SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- 引入 Tailwind CSS 用於快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .input-locked {
            background-color: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #e5e7eb;
        }
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        #lang-selector {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <!-- 導覽列 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-bottom border-gray-100">
        <div class="max-w-4xl mx-auto flex justify-around">
            <button onclick="switchTab('home')" id="tab-home" class="py-4 px-6 text-gray-500 tab-active transition-all" data-i18n="navHome">Home</button>
            <button onclick="switchTab('input')" id="tab-input" class="py-4 px-6 text-gray-500 transition-all" data-i18n="navInput">Data Input</button>
            <button onclick="switchTab('report')" id="tab-report" class="py-4 px-6 text-gray-500 transition-all" data-i18n="navReport">Report</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        
        <!-- Home 分頁 -->
        <section id="content-home">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-gray-800" data-i18n="homeTitle">資料總匯 (Home)</h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="date" id="search-date" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-40">
                    <button onclick="performSearch()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm transition-colors whitespace-nowrap" data-i18n="searchBtn">搜尋</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100">
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider" data-i18n="thTime">輸入時間</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider" data-i18n="thD1">資料 1</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider" data-i18n="thD2">資料 2</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider" data-i18n="thD3">資料 3</th>
                                <th class="p-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center" data-i18n="thAction">操作</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body">
                            <!-- 數據會動態插入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Data Input 分頁 -->
        <section id="content-input" class="hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-50">
                <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Datainputtrial</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="labelD1">資料 1 (自由輸入)</label>
                        <input type="text" id="data1" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="labelD2">資料 2 (自動鎖定)</label>
                        <input type="text" id="data2" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" data-i18n-placeholder="phLocked" placeholder="Enter 或離開即鎖定">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-i18n="labelD3">資料 3 (自動鎖定)</label>
                        <div class="flex gap-2">
                            <input type="text" id="data3" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all" data-i18n-placeholder="phLocked" placeholder="Enter 或離開即鎖定">
                            <button id="scan-btn" onclick="toggleScanner()" class="bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-lg transition-colors shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                        <div id="reader" class="mt-4 rounded-xl overflow-hidden border-2 border-dashed border-gray-200 hidden"></div>
                    </div>

                    <button onclick="submitData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95" data-i18n="submitBtn">提交資料至 Home</button>
                    <button onclick="resetForm()" class="w-full text-gray-400 text-sm hover:text-gray-600 transition-colors" data-i18n="resetBtn">清空當前內容</button>
                </div>
            </div>
        </section>

        <!-- Report 分頁 -->
        <section id="content-report" class="hidden">
            <div class="flex flex-col items-center justify-center py-20 text-center">
                <div class="bg-gray-100 p-6 rounded-full mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <p class="text-gray-400 italic" data-i18n="reportPlaceholder">報表功能開發中...</p>
            </div>
        </section>
    </main>

    <!-- 語言選擇器 -->
    <div id="lang-selector" class="bg-white/80 backdrop-blur shadow-lg border border-gray-200 rounded-full px-4 py-2">
        <select onchange="changeLanguage(this.value)" class="bg-transparent text-sm font-medium outline-none cursor-pointer text-gray-600">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
        </select>
    </div>

    <script>
        const i18n = {
            zh: {
                navHome: "主頁", navInput: "輸入數據", navReport: "報表",
                homeTitle: "資料總匯 (Home)", searchBtn: "搜尋",
                thTime: "時間", thD1: "資料 1", thD2: "資料 2", thD3: "資料 3", thAction: "操作",
                labelD1: "資料 1 (自由輸入)", labelD2: "資料 2 (自動鎖定)", labelD3: "資料 3 (自動鎖定)",
                phLocked: "輸入內容後即鎖定", submitBtn: "提交並儲存", resetBtn: "重置表單",
                reportPlaceholder: "報表模組正在對接中...", noRecords: "查無此日期的紀錄", emptyTable: "目前沒有任何數據紀錄",
                exportBtn: "Export", loading: "導出中...", errorTemplate: "找不到模板檔案，請確認 GitHub 已上傳 Report_Template.xlsx"
            },
            en: {
                navHome: "Home", navInput: "Input", navReport: "Report",
                homeTitle: "Data Center (Home)", searchBtn: "Search",
                thTime: "Time", thD1: "Data 1", thD2: "Data 2", thD3: "Data 3", thAction: "Action",
                labelD1: "Field 1 (Free Text)", labelD2: "Field 2 (Auto-Lock)", labelD3: "Field 3 (Auto-Lock)",
                phLocked: "Locked after input", submitBtn: "Submit Record", resetBtn: "Reset Form",
                reportPlaceholder: "Report module coming soon...", noRecords: "No records found", emptyTable: "No data records yet",
                exportBtn: "Export", loading: "Exporting...", errorTemplate: "Template not found. Check GitHub repo."
            }
        };

        let currentLang = 'zh';
        let localData = [];
        let html5QrCode = null;
        let lastDisplayedData = null;

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = i18n[lang][el.getAttribute('data-i18n')];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = i18n[lang][el.getAttribute('data-i18n-placeholder')];
            });
            updateTableUI(lastDisplayedData || localData);
        }

        window.submitData = function() {
            const d1 = document.getElementById('data1').value.trim();
            const d2 = document.getElementById('data2').value.trim();
            const d3 = document.getElementById('data3').value.trim();
            if (!d1 && !d2 && !d3) return;

            const now = new Date();
            localData.unshift({
                id: Date.now(),
                timestamp: now.toLocaleString(),
                dateOnly: now.toISOString().split('T')[0],
                d1: d1 || "-", d2: d2 || "-", d3: d3 || "-"
            });
            updateTableUI(localData);
            resetForm();
            switchTab('home');
        };

        function updateTableUI(displayData) {
            lastDisplayedData = displayData;
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            if (displayData.length === 0) {
                const msg = localData.length === 0 ? i18n[currentLang].emptyTable : i18n[currentLang].noRecords;
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400 italic">${msg}</td></tr>`;
                return;
            }

            displayData.forEach(item => {
                const row = document.createElement('tr');
                row.className = "border-b border-gray-50 hover:bg-gray-50/50 transition-colors";
                row.innerHTML = `
                    <td class="p-4 text-xs text-gray-500">${item.timestamp}</td>
                    <td class="p-4 text-sm font-medium text-gray-700">${item.d1}</td>
                    <td class="p-4 text-sm text-gray-600">${item.d2}</td>
                    <td class="p-4 text-sm text-gray-600">${item.d3}</td>
                    <td class="p-4 text-center">
                        <button id="btn-${item.id}" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 py-1 rounded border border-blue-100 text-xs font-semibold transition-all" onclick="exportWithRemoteTemplate(${item.id})">
                            ${i18n[currentLang].exportBtn}
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 核心功能：讀取 GitHub 上的模板並填值
        window.exportWithRemoteTemplate = async function(recordId) {
            const btn = document.getElementById(`btn-${recordId}`);
            const originalText = btn.innerText;
            
            try {
                btn.innerText = i18n[currentLang].loading;
                btn.disabled = true;

                const record = localData.find(r => r.id === recordId);
                const templateName = 'Report_Template.xlsx';

                // 1. Fetch 模板 (GitHub 環境下 fetch 同目錄檔案)
                const response = await fetch(templateName);
                if (!response.ok) throw new Error(i18n[currentLang].errorTemplate);
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                // 2. 寫入 Data 分頁 (欄位: Input Date, Data1, Data2, Data3)
                const wsData = workbook.Sheets["Data"];
                if (wsData) {
                    XLSX.utils.sheet_add_aoa(wsData, [[record.dateOnly, record.d1, record.d2, record.d3]], { origin: "A2" });
                }

                // 3. 寫入 RP 分頁 (精確格位填值)
                const wsRP = workbook.Sheets["RP"];
                if (wsRP) {
                    // 根據 CSV 結構，Data1 在 B3 (假設 A3 是 Label)，以此類推
                    const updateCell = (cellAddr, value) => {
                        wsRP[cellAddr] = { v: value, t: 's' };
                    };
                    updateCell('B3', record.d1);
                    updateCell('B4', record.d2);
                    updateCell('B5', record.d3);
                    updateCell('B7', record.dateOnly);
                }

                // 4. 下載
                XLSX.writeFile(workbook, `Report_${record.dateOnly}_${recordId}.xlsx`);

            } catch (err) {
                alert(err.message);
                console.error(err);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };

        window.performSearch = function() {
            const val = document.getElementById('search-date').value;
            updateTableUI(val ? localData.filter(i => i.dateOnly === val) : localData);
        };

        window.switchTab = async function(tabId) {
            if (tabId !== 'input') await stopScanner();
            ['home', 'input', 'report'].forEach(id => {
                document.getElementById(`content-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
        };

        function setupAutoLock(id, btnId = null) {
            const el = document.getElementById(id);
            const lock = () => {
                if (el.value.trim() !== "" && !el.readOnly) {
                    el.readOnly = true;
                    el.classList.add('input-locked');
                    if(btnId) document.getElementById(btnId).classList.add('hidden');
                }
            };
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { lock(); el.blur(); } });
            el.addEventListener('blur', lock);
        }

        setupAutoLock('data2');
        setupAutoLock('data3', 'scan-btn');

        window.toggleScanner = async function() {
            const readerDiv = document.getElementById('reader');
            if (html5QrCode && html5QrCode.isScanning) { await stopScanner(); return; }
            readerDiv.classList.remove('hidden');
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    const d3 = document.getElementById('data3');
                    d3.value = text;
                    stopScanner();
                    d3.focus(); d3.blur();
                });
            } catch (err) { console.error(err); }
        };

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                document.getElementById('reader').classList.add('hidden');
            }
        }

        window.resetForm = function() {
            ['data1', 'data2', 'data3'].forEach(id => {
                const el = document.getElementById(id);
                el.value = ""; el.readOnly = false; el.classList.remove('input-locked');
            });
            document.getElementById('scan-btn').classList.remove('hidden');
            stopScanner();
        };

        changeLanguage('zh');
    </script>
</body>
</html>
