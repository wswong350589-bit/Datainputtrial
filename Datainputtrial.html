<body class="bg-gray-50 min-h-screen pb-20">

    <!-- 頂部導覽列 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-around">
            <button onclick="switchTab(&#39;home&#39;)" id="tab-home" class="py-4 px-6 text-gray-500 hover:text-blue-500 transition-all tab-active" data-i18n="navHome">Home</button>
            <button onclick="switchTab(&#39;input&#39;)" id="tab-input" class="py-4 px-6 text-gray-500 hover:text-blue-500 transition-all" data-i18n="navInput">Data Input</button>
            <button onclick="switchTab(&#39;report&#39;)" id="tab-report" class="py-4 px-6 text-gray-500 hover:text-blue-500 transition-all" data-i18n="navReport">Report</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        
        <!-- Home 分頁 -->
        <section id="content-home" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-gray-800" data-i18n="homeTitle">資料總匯 (Home)</h2>
                
                <div class="flex flex-wrap items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-100">
                    <label class="text-sm font-medium text-gray-600 ml-2" data-i18n="searchLabel">輸入日期:</label>
                    <input type="date" id="search-date" class="px-2 py-1 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <button onclick="performSearch()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded text-sm font-medium transition-colors" data-i18n="searchBtn">搜尋</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" data-i18n="thTime">輸入時間</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" data-i18n="thD1">資料 1</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" data-i18n="thD2">資料 2</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" data-i18n="thD3">資料 3</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white divide-y divide-gray-200 text-sm"><tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">尚無輸入紀錄</td></tr></tbody>
                </table>
            </div>
        </section>

        <!-- Data Input 分頁 -->
        <section id="content-input" class="tab-content hidden">
            <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Datainputtrial</h2>
                
                <div class="space-y-6">
                    <!-- Data 1 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelD1">資料 1 (自由輸入)</label>
                        <input type="text" id="data1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <!-- Data 2 (鎖定) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelD2">資料 2 (自動鎖定)</label>
                        <input type="text" id="data2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" data-i18n-placeholder="phLocked" placeholder="Enter 或離開即鎖定">
                    </div>

                    <!-- Data 3 (鎖定) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="labelD3">資料 3 (自動鎖定)</label>
                        <div class="flex gap-2">
                            <input type="text" id="data3" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" data-i18n-placeholder="phLocked" placeholder="Enter 或離開即鎖定">
                            <button id="scan-btn" onclick="toggleScanner()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                        <div id="reader" class="mt-4 border-2 border-dashed border-gray-200 rounded-lg overflow-hidden hidden"></div>
                    </div>

                    <!-- 提交按鈕 -->
                    <div class="flex flex-col gap-2 pt-4">
                        <button id="submit-btn" onclick="submitData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-all shadow-md" data-i18n="submitBtn">提交資料至 Home</button>
                        <button onclick="resetForm()" class="text-sm text-gray-500 hover:text-gray-700" data-i18n="resetBtn">清空當前內容</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Report 分頁 -->
        <section id="content-report" class="tab-content text-center py-20 hidden">
            <p class="text-gray-400 italic text-lg" data-i18n="reportPlaceholder">報表功能開發中...</p>
        </section>

    </main>

    <!-- 語言選擇器 -->
    <div id="lang-selector" class="bg-white shadow-lg border border-gray-200 rounded-full px-3 py-1 flex items-center gap-2">
        <select onchange="changeLanguage(this.value)" class="text-xs font-medium bg-transparent outline-none cursor-pointer">
            <option value="zh">Chinese(Traditional)</option>
            <option value="en">English</option>
        </select>
    </div>

    <script>
        // --- 多語系設定 ---
        const i18n = {
            zh: {
                navHome: "Home", navInput: "Data Input", navReport: "Report",
                homeTitle: "資料總匯 (Home)", searchLabel: "輸入日期:", searchBtn: "搜尋",
                thTime: "輸入時間", thD1: "資料 1", thD2: "資料 2", thD3: "資料 3",
                labelD1: "資料 1 (自由輸入)", labelD2: "資料 2 (自動鎖定)", labelD3: "資料 3 (自動鎖定)",
                phLocked: "Enter 或離開即鎖定", submitBtn: "提交資料至 Home", resetBtn: "清空當前內容",
                reportPlaceholder: "報表功能開發中...", noRecords: "找不到符合條件的紀錄", emptyTable: "尚無輸入紀錄"
            },
            en: {
                navHome: "Home", navInput: "Data Input", navReport: "Report",
                homeTitle: "Data Summary (Home)", searchLabel: "Input Date:", searchBtn: "Search",
                thTime: "Input Time", thD1: "Data 1", thD2: "Data 2", thD3: "Data 3",
                labelD1: "Data 1 (Free Input)", labelD2: "Data 2 (Auto-Lock)", labelD3: "Data 3 (Auto-Lock)",
                phLocked: "Enter or Blur to Lock", submitBtn: "Submit to Home", resetBtn: "Clear Current Form",
                reportPlaceholder: "Report feature coming soon...", noRecords: "No matching records found", emptyTable: "No records yet"
            }
        };

        let currentLang = 'zh';
        let localData = [];
        let html5QrCode = null;

        /**
         * 切換語言
         */
        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = i18n[lang][key];
            });
            updateTableUI(lastDisplayedData || localData);
        }

        /**
         * 提交資料
         */
        window.submitData = function() {
            const d1 = document.getElementById('data1').value.trim();
            const d2 = document.getElementById('data2').value.trim();
            const d3 = document.getElementById('data3').value.trim();

            if (!d1 && !d2 && !d3) return;

            const now = new Date();
            const newRecord = {
                id: Date.now(),
                timestamp: now.toLocaleString(),
                dateOnly: now.toISOString().split('T')[0],
                d1: d1 || "-",
                d2: d2 || "-",
                d3: d3 || "-"
            };

            localData.unshift(newRecord);
            updateTableUI(localData);
            resetForm();
            switchTab('home');
        };

        let lastDisplayedData = null;
        function updateTableUI(displayData) {
            lastDisplayedData = displayData;
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';

            if (displayData.length === 0) {
                const msg = localData.length === 0 ? i18n[currentLang].emptyTable : i18n[currentLang].noRecords;
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">${msg}</td></tr>`;
                return;
            }

            displayData.forEach(item => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition-colors";
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.timestamp}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-medium text-gray-900">${item.d1}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.d2}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-gray-600">${item.d3}</td>
                `;
                tbody.appendChild(row);
            });
        }

        window.performSearch = function() {
            const searchVal = document.getElementById('search-date').value;
            if (!searchVal) {
                updateTableUI(localData);
                return;
            }
            const filtered = localData.filter(item => item.dateOnly === searchVal);
            updateTableUI(filtered);
        };

        window.switchTab = async function(tabId) {
            if (tabId !== 'input') await stopScanner();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active'));
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
            if (tabId === 'home') {
                document.getElementById('search-date').value = "";
                updateTableUI(localData);
            }
        };

        // --- 自動鎖定邏輯 ---
        function setupAutoLock(inputId, btnId = null) {
            const el = document.getElementById(inputId);
            const lock = () => {
                if (el.value.trim() !== "" && !el.readOnly) {
                    el.readOnly = true;
                    el.classList.add('input-locked');
                    if(btnId) document.getElementById(btnId).classList.add('hidden');
                }
            };
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { lock(); el.blur(); } });
            el.addEventListener('blur', lock);
        }

        setupAutoLock('data2');
        setupAutoLock('data3', 'scan-btn');

        // --- QR Code 控制 ---
        window.toggleScanner = async function() {
            const readerDiv = document.getElementById('reader');
            if (html5QrCode && html5QrCode.isScanning) {
                await stopScanner();
                return;
            }
            readerDiv.classList.remove('hidden');
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 250 } }, 
                    (text) => {
                        const d3 = document.getElementById('data3');
                        d3.value = text;
                        stopScanner();
                        // 觸發鎖定
                        d3.focus();
                        d3.blur(); 
                    }
                );
            } catch (err) {
                console.error(err);
                readerDiv.innerHTML = `<p class="p-4 text-red-500 text-center text-sm">Camera Error</p>`;
            }
        };

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                document.getElementById('reader').classList.add('hidden');
            }
        }

        window.resetForm = function() {
            ['data1', 'data2', 'data3'].forEach(id => {
                const el = document.getElementById(id);
                el.value = "";
                el.readOnly = false;
                el.classList.remove('input-locked');
            });
            document.getElementById('scan-btn').classList.remove('hidden');
            stopScanner();
        };

        // 初始化
        changeLanguage('zh');
    </script>

</body></html>
